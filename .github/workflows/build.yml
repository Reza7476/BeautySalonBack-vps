name: Build & Deploy Backend

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SaharBeautySalonBack.sln

      - name: Build
        run: dotnet build SaharBeautySalonBack.sln --configuration Release --no-restore

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/reza7476/beautysalonback-vps:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/reza7476/beautysalonback-vps:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" \
              --password-stdin

            cd /opt/docker/services/beauty-api-backend

            docker compose pull

            docker compose up -d

            docker image prune -f